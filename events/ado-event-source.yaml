apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: ado-event-source
  namespace: luban-ci
spec:
  service:
    ports:
      - port: 13100
        targetPort: 13100
  webhook:
    ado:
      port: "13100"
      endpoint: "/ado/push"
      method: "POST"
      auth:
        token:
          name: webhook-secret
          key: secret
