apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: view-templates-{{ cookiecutter.target_namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: luban-view-templates
subjects:
- kind: ServiceAccount
  name: project-admin
  namespace: {{ cookiecutter.target_namespace }}
- kind: ServiceAccount
  name: project-developer
  namespace: {{ cookiecutter.target_namespace }}