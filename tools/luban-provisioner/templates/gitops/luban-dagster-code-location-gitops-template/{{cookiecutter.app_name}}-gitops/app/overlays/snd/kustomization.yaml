apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: snd-{{cookiecutter.project_name}}

images:
  - name: "{{cookiecutter.registry_server}}/{{cookiecutter.project_name}}/{{cookiecutter.app_name}}"
    newTag: "{{cookiecutter.image_tag}}"

configMapGenerator:
  # Rollout trigger for app/overlays/snd/configmap.yaml only. This avoids reading ../../base
  # from configMapGenerator.files (which can trip Argo CD/Kustomize file sandboxing).
  - name: "{{cookiecutter.app_name}}-overlay-config-rollout"
    files:
      - overlay-configmap.yaml=configmap.yaml

replacements:
  - source:
      kind: Deployment
      name: "{{cookiecutter.app_name}}"
      fieldPath: spec.template.spec.containers.[name={{cookiecutter.app_name}}].image
    targets:
      - select:
          kind: Deployment
          name: "{{cookiecutter.app_name}}"
        fieldPaths:
          - spec.template.spec.containers.[name={{cookiecutter.app_name}}].env.[name=DAGSTER_CURRENT_IMAGE].value

patches:
  - path: configmap.yaml
  - path: secret.yaml
