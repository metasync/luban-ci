apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - deployment.yaml
  - secret.yaml
  - service.yaml

labels:
  - pairs:
      app.kubernetes.io/name: "{{cookiecutter.app_name}}"
      app.kubernetes.io/part-of: "{{cookiecutter.project_name}}"
    includeSelectors: true
    includeTemplates: true

configMapGenerator:
  # Rollout trigger for app/base/configmap.yaml. This generator intentionally reads only
  # in-tree files to avoid cross-tree file load issues when Argo CD builds from an overlay.
  - name: "{{cookiecutter.app_name}}-base-config-rollout"
    files:
      - base-configmap.yaml=configmap.yaml
