apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{cookiecutter.app_name}}
  labels:
    app: {{cookiecutter.app_name}}
    component: code-location
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{cookiecutter.app_name}}
  template:
    metadata:
      labels:
        app: {{cookiecutter.app_name}}
    spec:
      containers:
        - name: {{cookiecutter.app_name}}
          image: "{{cookiecutter.registry_server}}/{{cookiecutter.project_name}}/{{cookiecutter.app_name}}:latest"
          imagePullPolicy: Always
          args: ["dagster", "code-server", "start", "-h", "0.0.0.0", "-p", "{{cookiecutter.code_location_port}}", "-m", "{{cookiecutter.package_name}}"]
          ports:
            - containerPort: {{cookiecutter.code_location_port}}
              name: grpc
              protocol: TCP
          envFrom:
            - configMapRef:
                name: dagster-env
                optional: true
            - configMapRef:
                name: dagster-observability
                optional: true
            - configMapRef:
                name: "{{cookiecutter.app_name}}-config"
            - secretRef:
                name: "{{cookiecutter.app_name}}-secret"
                optional: true
          env:
            - name: DAGSTER_CURRENT_IMAGE
              value: "$(DAGSTER_APP_IMAGE)"
            - name: LUBAN_RUN_ENV_CONFIGMAP
              value: "{{cookiecutter.app_name}}-config"
            - name: LUBAN_RUN_ENV_SECRET
              value: "{{cookiecutter.app_name}}-secret"
            - name: OTEL_SERVICE_NAME
              value: "{{ cookiecutter.otel_service_name or cookiecutter.project_name ~ '-' ~ cookiecutter.app_name }}"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "{{ cookiecutter.otel_resource_attributes ~ ',dagster.component=code-location,dagster.code_location=' ~ cookiecutter.app_name if cookiecutter.otel_resource_attributes else 'dagster.component=code-location,dagster.code_location=' ~ cookiecutter.app_name }}"
            - name: DAGSTER_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dagster-postgresql-secret
                  key: postgresql-password
                  optional: true
          livenessProbe:
            grpc:
              port: {{cookiecutter.code_location_port}}
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            grpc:
              port: {{cookiecutter.code_location_port}}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: dagster-home
              mountPath: /tmp/dagster_home
      volumes:
        - name: dagster-home
          emptyDir: {}
