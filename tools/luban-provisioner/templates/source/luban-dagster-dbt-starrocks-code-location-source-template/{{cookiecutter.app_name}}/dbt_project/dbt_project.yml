name: "{{cookiecutter.package_name}}_dbt"
version: "1.0.0"
config-version: 2

profile: "{{cookiecutter.package_name}}"

vars:
  ods_schema: "{% raw %}{% set base = env_var('STARROCKS_DB', 'dbt') %}{% set raw = env_var('STARROCKS_ODS_DB', 'ods') %}{% if raw.startswith(base ~ '_') %}{{ raw[(base|length)+1:] }}{% else %}{{ raw }}{% endif %}{% endraw %}"
  dwd_schema: "{% raw %}{{ env_var('STARROCKS_DWD_DB', 'dwd') }}{% endraw %}"
  dws_schema: "{% raw %}{{ env_var('STARROCKS_DWS_DB', 'dws') }}{% endraw %}"
  enable_ods_test: false
  ods_test_customers_count: 500
  ods_test_customers_append_count: 0
  ods_test_orders_per_customer: 20
  ods_test_orders_append_count: 1000
  ods_test_days: 30
  ods_test_base_ts: ""

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  "{{cookiecutter.package_name}}_dbt":
    +on_schema_change: "append_new_columns"
    dwd:
      +materialized: table
      +schema: "{% raw %}{{ env_var('STARROCKS_DWD_DB', 'dwd') }}{% endraw %}"
    dws:
      +materialized: table
      +schema: "{% raw %}{{ env_var('STARROCKS_DWS_DB', 'dws') }}{% endraw %}"
