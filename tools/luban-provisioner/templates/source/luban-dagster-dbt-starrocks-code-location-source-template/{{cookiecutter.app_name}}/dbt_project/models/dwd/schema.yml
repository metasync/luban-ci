version: 2

models:
  - name: customers
    description: "DWD customer entity derived from ODS customer records. One row per customer."
    tests:
      - row_count_greater_than:
          arguments:
            min_value: 0
    columns:
      - name: customer_id
        description: "Customer unique identifier from the source system."
        tests:
          - not_null
          - unique
      - name: first_name
        description: "Customer first name."
      - name: last_name
        description: "Customer last name."

  - name: orders
    description: "DWD order entity derived from ODS order records. One row per order."
    tests:
      - row_count_greater_than:
          arguments:
            min_value: 0
    columns:
      - name: order_id
        description: "Order unique identifier from the source system."
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer identifier associated with the order."
        tests:
          - not_null
      - name: order_amount
        description: "Order amount metric from the source system."
        tests:
          - not_null
      - name: order_datetime
        description: "Order event datetime in the source system."
        tests:
          - not_null
      - name: order_date
        description: "Order event date derived from order_datetime."
        tests:
          - not_null
