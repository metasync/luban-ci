version: 2

models:
  - name: dim_customer
    description: "Customer dimension built from DWD customers. Used by downstream fact models."
    tests:
      - row_count_greater_than:
          arguments:
            min_value: 0
    columns:
      - name: customer_id
        description: "Surrogate/business key for the customer dimension (from DWD)."
        tests:
          - not_null
          - unique
      - name: first_name
        description: "Customer first name."
      - name: last_name
        description: "Customer last name."

  - name: fact_customer_orders_daily
    description: "Daily customer order fact aggregated from DWD orders. One row per customer per day."
    tests:
      - row_count_greater_than:
          arguments:
            min_value: 0
    columns:
      - name: order_date
        description: "Date bucket for the fact grain."
        tests:
          - not_null
      - name: customer_id
        description: "Customer identifier for the fact grain."
        tests:
          - not_null
      - name: order_count
        description: "Number of orders for the customer on the date."
      - name: total_amount
        description: "Sum of order amounts for the customer on the date."

  - name: fact_orders_daily
    description: "Daily order fact aggregated from DWD orders. One row per day."
    tests:
      - row_count_greater_than:
          arguments:
            min_value: 0
    columns:
      - name: order_date
        description: "Date bucket for the fact grain."
        tests:
          - not_null
          - unique
      - name: order_count
        description: "Number of orders on the date."
      - name: total_amount
        description: "Sum of order amounts on the date."
