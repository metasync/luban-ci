version: 2

sources:
  - name: ods
    schema: "{{ env_var('STARROCKS_ODS_DB', 'ods') }}"
    tables:
      - name: customers
        meta:
          luban:
            observe:
              watermark_column: ods_updated_at
        columns:
          - name: customer_id
            tests:
              - not_null
              - unique
          - name: first_name
            tests:
              - not_null
          - name: last_name
            tests:
              - not_null
          - name: updated_at
            description: "Timestamp when the customer record was last updated in the source system."
          - name: ods_created_at
            tests:
              - not_null
          - name: ods_updated_at
            tests:
              - not_null
      - name: orders
        columns:
          - name: order_id
            tests:
              - not_null
              - unique
          - name: customer_id
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('ods', 'customers')
                    field: customer_id
          - name: order_amount
            tests:
              - not_null
          - name: order_datetime
            tests:
              - not_null
          - name: updated_at
            description: "Timestamp when the order record was last updated in the source system."
          - name: ods_created_at
            tests:
              - not_null
          - name: ods_updated_at
            tests:
              - not_null
