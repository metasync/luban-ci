version: 2

models:
  - name: ods_test_customers
    description: "Synthetic ODS customers for local testing"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: ods_test_orders
    description: "Synthetic ODS orders for local testing"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('ods_test_customers')
                field: customer_id
