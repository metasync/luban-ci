apiVersion: v1
kind: ConfigMap
metadata:
  name: luban-config
  namespace: luban-ci
  labels:
    workflows.argoproj.io/configmap-type: Parameter
  annotations:
    replicator.v1.mittwald.de/replication-allowed: "true"
    replicator.v1.mittwald.de/replication-allowed-namespaces: "^ci-.*"
data:
  # Domain suffix
  domain_suffix: "apps.metasync.cc"

  # Registry server
  registry_server: "harbor.luban.metasync.cc"
  image_pull_secret: "harbor-ro-creds"

  # Web Hook URL
  webhook_url: "https://webhook-luban.metasync.cc"

  # Cluster Map (JSON) - Maps environments to Cluster URLs
  # For single-cluster setup, both map to the local cluster (https://kubernetes.default.svc)
  cluster_map: |
    {
      "snd": "https://kubernetes.default.svc",
      "prd": "https://kubernetes.default.svc"
    }

  # Git providers
  github_server: "github.com"
  azure_server: "dev.azure.com"

  # Git HTTPS authentication (provider-scoped)
  # Values:
  # - "credential_store": use `git credential.helper store` and write PAT to `~/.git-credentials` inside the workflow/provisioner container.
  # - "extraheader_basic": do not write credential files; send `Authorization: Basic <base64(username:PAT)>` via `http.extraHeader` per git command.
  github_https_auth_mode: "credential_store"
  azure_https_auth_mode: "credential_store"
  # Optional provider base URL overrides (scheme + optional path prefix)
  # github_base_url: "https://github.mycorp.com"
  
  # Azure DevOps Server base URL (scheme + optional path prefix)
  # azure_base_url: "https://ado.example.com/tfs"

  # Optional username used to build the Basic auth header for git HTTPS when using `extraheader_basic`
  # (default: `username` from the `azure-creds` secret)
  # azure_basic_auth_username: "git"
  

  # Azure DevOps REST API version
  azure_devops_api_version: "7.1"

  # Tooling Images
  luban_provisioner_image: "quay.io/luban-ci/luban-provisioner:0.3.8"
  gitops_utils_image: "quay.io/luban-ci/gitops-utils:0.3.7"

  # Python Package Index (Optional)
  # python_index_url: "https://devpi.luban-ci.io/root/pypi"
  # python_index_name: "devpi"

  # Air-Gapped Mirrors (Optional)
  # uv_release_base_url: "https://mirror.example.com/uv/releases/download"
  # uv_python_install_mirror: "https://mirror.example.com/python"
