apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-controller-secret-reader
  namespace: luban-ci
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-controller-secret-reader-binding
  namespace: luban-ci
subjects:
- kind: ServiceAccount
  name: argo-workflows-workflow-controller
  namespace: argo
roleRef:
  kind: Role
  name: argo-workflow-controller-secret-reader
  apiGroup: rbac.authorization.k8s.io
