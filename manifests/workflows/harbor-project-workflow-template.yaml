apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: harbor-project-setup-template
  namespace: luban-ci
spec:
  entrypoint: create-project
  serviceAccountName: luban-ci-sa
  volumes:
    - name: luban-ca-cert
      secret:
        secretName: luban-ca-cert
        optional: true
  arguments:
    parameters:
      - name: project_name
        description: "Name of the Harbor project to create"
      - name: registry_visibility
        description: "Project visibility (public or private)"
        value: "public"
        enum:
          - "public"
          - "private"
      - name: registry_server
        description: "Registry server domain (e.g. harbor.example.com)"
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: registry_server
            optional: true
      - name: gitops_utils_image
        description: "Image for GitOps utility tools"
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: gitops_utils_image

  templates:
    - name: create-project
      inputs:
        parameters:
          - name: project_name
          - name: registry_visibility
      container:
        image: "{{workflow.parameters.gitops_utils_image}}"
        command: [sh, -c]
        args:
          - |
            PROJECT_NAME="{{inputs.parameters.project_name}}"
            HARBOR_URL="https://${REGISTRY_SERVER}"
            VISIBILITY="{{inputs.parameters.registry_visibility}}"
            
            if [ "$VISIBILITY" = "public" ]; then
              PUBLIC="true"
            else
              PUBLIC="false"
            fi

            echo "Creating project '$PROJECT_NAME' on $HARBOR_URL..."
            
            PAYLOAD=$(cat <<EOF
            {
              "project_name": "$PROJECT_NAME",
              "public": $PUBLIC,
              "metadata": {
                "public": "$PUBLIC"
              }
            }
            EOF
            )

            RESPONSE=$(curl -s -w "%{http_code}" -o /dev/null -u "$HARBOR_USERNAME:$HARBOR_PASSWORD" \
              -X POST "$HARBOR_URL/api/v2.0/projects" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            if [ "$RESPONSE" -eq 201 ]; then
                echo "Project created successfully."
            elif [ "$RESPONSE" -eq 409 ]; then
                echo "Project already exists."
            else
                echo "Failed to create project. HTTP status: $RESPONSE"
                # Print body for debugging
                curl -s -u "$HARBOR_USERNAME:$HARBOR_PASSWORD" \
                  -X POST "$HARBOR_URL/api/v2.0/projects" \
                  -H "Content-Type: application/json" \
                  -d "$PAYLOAD"
                exit 1
            fi
        env:
          - name: CURL_CA_BUNDLE
            valueFrom:
              secretKeyRef:
                name: luban-ca-cert
                key: curl_ca_bundle
                optional: true
          - name: REGISTRY_SERVER
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: registry_server
                optional: true
          - name: HARBOR_USERNAME
            valueFrom:
              secretKeyRef:
                name: harbor-api-creds
                key: HARBOR_USERNAME
          - name: HARBOR_PASSWORD
            valueFrom:
              secretKeyRef:
                name: harbor-api-creds
                key: HARBOR_PASSWORD
        volumeMounts:
          - name: luban-ca-cert
            mountPath: /var/run/luban/ca
            readOnly: true
