apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: gitops-repo-provision-template
  namespace: luban-ci
spec:
  entrypoint: provision-gitops-repo
  serviceAccountName: luban-ci-sa
  arguments:
    parameters:
      - name: project_name
        description: "Name of the project/team (e.g. dataops)"
      - name: application_name
        description: "Name of the application"
      - name: git_organization
        description: "Git Organization/User"
        value: "metasync"
      - name: git_provider
        description: "Git Provider (github, azure, ado)"
        value: "azure"
        enum:
          - "github"
          - "azure"
          - "ado"
      - name: config_file
        description: "Path to configuration file"
        value: ""
      - name: luban_provisioner_image
        description: "Image for the template rendering tool"
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: luban_provisioner_image

  templates:
    - name: provision-gitops-repo
      inputs:
        parameters:
          - name: project_name
          - name: application_name
          - name: git_organization
          - name: git_provider
          - name: config_file
      
      dag:
        tasks:
          - name: provision-repo
            template: provision-repo
            arguments:
              parameters:
                - name: project_name
                  value: "{{inputs.parameters.project_name}}"
                - name: application_name
                  value: "{{inputs.parameters.application_name}}"
                - name: git_organization
                  value: "{{inputs.parameters.git_organization}}"
                - name: git_provider
                  value: "{{inputs.parameters.git_provider}}"
                - name: config_file
                  value: "{{inputs.parameters.config_file}}"

    - name: provision-repo
      inputs:
        parameters:
          - name: project_name
          - name: application_name
          - name: git_organization
          - name: git_provider
          - name: config_file
      container:
        image: "{{workflow.parameters.luban_provisioner_image}}"
        imagePullPolicy: Always
        args:
          - gitops
          - --project-name
          - "{{inputs.parameters.project_name}}"
          - --application-name
          - "{{inputs.parameters.application_name}}"
          - --output-dir
          - "/workdir"
          - --git-organization
          - "{{inputs.parameters.git_organization}}"
          - --git-provider
          - "{{inputs.parameters.git_provider}}"
          - --git-server
          - "$(GIT_SERVER)"
          - --git-username
          - "$(GIT_USERNAME)"
          - --config-file
          - "{{inputs.parameters.config_file}}"
          - --git-token
          - "$(GIT_TOKEN)"
        env:
          - name: GIT_SERVER
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_server"
          - name: GIT_HTTPS_AUTH_MODE
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_https_auth_mode"
                optional: true
          - name: GIT_BASE_URL
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_base_url"
                optional: true
          - name: GIT_BASIC_AUTH_USERNAME
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_basic_auth_username"
                optional: true
          - name: AZURE_DEVOPS_API_VERSION
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_devops_api_version"
                optional: true
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.git_provider}}-creds"
                key: token
          - name: GIT_USERNAME
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.git_provider}}-creds"
                key: username
        volumeMounts:
          - name: workdir
            mountPath: /workdir
  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 100Mi
