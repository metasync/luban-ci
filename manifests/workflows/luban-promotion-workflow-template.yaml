apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: luban-promotion-template
spec:
  entrypoint: promote-snd-to-prd
  serviceAccountName: workflow-runner
  volumes:
    - name: luban-ca-cert
      secret:
        secretName: luban-ca-cert
        optional: true
  arguments:
    parameters:
      - name: project_name
        description: "Name of the project/team (e.g., 'payment')"
      - name: app_name
        description: "Name of the application (e.g., 'cart-service')"
      - name: git_organization
        description: "Git Organization/User (defaults to project_name if empty)"
        value: ""
      - name: git_provider
        description: "Git Provider (e.g., 'github', 'azure', 'ado')"
        value: "azure"
        enum:
          - "github"
          - "azure"
          - "ado"
      - name: luban_provisioner_image
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: luban_provisioner_image

  templates:
    - name: promote-snd-to-prd
      inputs:
        parameters:
          - name: project_name
          - name: app_name
          - name: git_organization
          - name: git_provider
      container:
        image: "{{workflow.parameters.luban_provisioner_image}}"
        args:
          - promote
          - --app-name
          - "{{inputs.parameters.app_name}}"
          - --git-organization
          - "{{inputs.parameters.git_organization}}"
          - --git-provider
          - "{{inputs.parameters.git_provider}}"
          - --project-name
          - "{{inputs.parameters.project_name}}"
          - --git-server
          - "$(GIT_SERVER)"
          - --git-username
          - "$(GIT_USERNAME)"
          - --git-token
          - "$(GIT_TOKEN)"
        env:
          - name: SSL_CERT_FILE
            valueFrom:
              secretKeyRef:
                name: luban-ca-cert
                key: ssl_cert_file
                optional: true
          - name: REQUESTS_CA_BUNDLE
            valueFrom:
              secretKeyRef:
                name: luban-ca-cert
                key: requests_ca_bundle
                optional: true
          - name: GIT_SSL_CAINFO
            valueFrom:
              secretKeyRef:
                name: luban-ca-cert
                key: git_ssl_cainfo
                optional: true
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.git_provider}}-creds"
                key: token
          - name: GIT_USERNAME
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.git_provider}}-creds"
                key: username
          - name: AZURE_DEVOPS_API_VERSION
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_devops_api_version"
                optional: true
          - name: GIT_SERVER
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_server"
          - name: GIT_HTTPS_AUTH_MODE
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_https_auth_mode"
                optional: true
          - name: GIT_BASE_URL
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_base_url"
                optional: true
          - name: GIT_BASIC_AUTH_USERNAME
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_basic_auth_username"
                optional: true
        volumeMounts:
          - name: luban-ca-cert
            mountPath: /var/run/luban/ca
            readOnly: true
