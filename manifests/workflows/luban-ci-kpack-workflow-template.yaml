apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: luban-ci-kpack-template
  # Cluster resources do not have a namespace
spec:
  entrypoint: ci-pipeline
  serviceAccountName: workflow-runner
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  # Keep pods until the workflow is deleted to ensure logs are available
  podGC:
    strategy: OnWorkflowDeletion
  # Automatically delete the workflow (and pods) after a delay to clean up
  ttlStrategy:
    secondsAfterCompletion: 86400 # 24 hours
    secondsAfterSuccess: 3600     # 1 hour (clean up successful runs faster)
    secondsAfterFailure: 86400    # 24 hours (keep failed runs longer)
  synchronization:
    semaphores:
      - configMapKeyRef:
          name: workflow-semaphores
          key: kpack-builds
  arguments:
    parameters:
      - name: repo_url
        description: "URL of the source code repository"
      - name: registry_namespace
        description: "Organization/Namespace for the registry (e.g., 'metasync')"
      - name: revision
        description: "Commit revision to build"
      - name: app_name
        description: "Name of the application"
      - name: sub_path
        description: "Sub-path within the repository to build"
        value: ""
      - name: git_ref
        description: "Git reference (branch or tag)"
        value: ""
      - name: tag
        description: "Explicit image tag to use (overrides revision)"
        value: ""
      - name: git_provider
        description: "Git Provider (e.g., 'github', 'gitlab')"
        value: "github"
      - name: git_creds_secret
        description: "Name of the secret containing git credentials"
        value: "github-creds"
      - name: registry_server
        description: "Registry server to push image to"
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: registry_server
            optional: true
      - name: gitops_branch
        description: "Branch in GitOps repo to update (usually 'develop')"
        value: "develop"
      - name: deploy_env
        description: "Deployment environment (e.g., 'snd', 'prd')"
        value: "snd"
      - name: gitops_utils_image
        description: "Image for GitOps utility tools"
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: gitops_utils_image

  volumeClaimTemplates:
  - metadata:
      name: workdir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi

  templates:
  - name: ci-pipeline
    steps:
    - - name: build-push-by-commit
        template: build-push
        when: "'{{workflow.parameters.git_ref}}' !~ '^refs/tags/'"
        arguments:
          parameters:
            - name: namespace
              value: "{{workflow.parameters.registry_namespace}}"
            - name: mode
              value: commit
      - name: build-push-by-tag
        template: build-push
        when: "'{{workflow.parameters.git_ref}}' =~ '^refs/tags/'"
        arguments:
          parameters:
            - name: namespace
              value: "{{workflow.parameters.registry_namespace}}"
            - name: mode
              value: tag
    
    - - name: update-gitops
        template: git-update
        arguments:
          parameters:
            - name: namespace
              value: "{{workflow.parameters.registry_namespace}}"

  - name: build-push
    inputs:
      parameters:
        - name: namespace
        - name: mode
    outputs:
      parameters:
      - name: image_tag
        valueFrom:
          path: /tmp/image_tag
    container:
      image: "{{workflow.parameters.gitops_utils_image}}"
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
      command: [sh, -c]
      args:
      - |
        set -euo pipefail

        die() { echo "$1"; exit 1; }
        has_cntrl() { printf '%s' "$1" | LC_ALL=C grep -q '[[:cntrl:]]'; }
        require_no_cntrl() { if has_cntrl "$2"; then die "Error: $1 contains control characters"; fi; }
        require_dns_label() { printf '%s' "$2" | grep -Eq '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$' || die "Error: $1 is not a valid DNS label: $2"; }
        require_hex_rev() { printf '%s' "$2" | grep -Eq '^[0-9a-f]{7,40}$' || die "Error: $1 is not a valid git revision: $2"; }
        require_image_tag() { printf '%s' "$2" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$' || die "Error: $1 is not a valid image tag: $2"; }

        mkdir -p /tmp
        : > /tmp/image_tag

        mkdir -p ~/.kube
        kubectl config set-cluster local --server=https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        kubectl config set-credentials luban --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
        SA_NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
        kubectl config set-context local --cluster=local --user=luban --namespace="$SA_NAMESPACE"
        kubectl config use-context local

        KUBECTL="kubectl --request-timeout=5s"

        MODE="{{inputs.parameters.mode}}"
        TARGET_NAMESPACE="ci-${REGISTRY_NAMESPACE}"

        require_dns_label target_namespace "$TARGET_NAMESPACE"

        require_hex_rev revision "$REVISION"

        if printf "%s" "$APP_NAME" | grep -q '[^a-z0-9-]'; then
          die "Error: APP_NAME must contain only lowercase letters, digits, and '-': $APP_NAME"
        fi

        require_no_cntrl repo_url "$REPO_URL"

        if printf "%s" "$REPO_URL" | grep -q '"'; then
          die "Error: repo_url contains an unsupported character: \""
        fi

        if [ "$MODE" = "tag" ]; then
          if ! printf "%s" "$GIT_REF" | grep -q '^refs/tags/'; then
            die "Error: mode=tag but git_ref is not a tag: $GIT_REF"
          fi
          IMAGE_TAG="${GIT_REF#refs/tags/}"
          IMAGE_TAG="${IMAGE_TAG#v}"
        else
          IMAGE_TAG="${TAG:-$REVISION}"
        fi

        require_image_tag image_tag "$IMAGE_TAG"
        echo -n "$IMAGE_TAG" > /tmp/image_tag

        if [ "${GIT_PROVIDER:-}" = "azure" ]; then
          case "$REPO_URL" in
            git@*|ssh://*) ;;
            *)
              if printf "%s" "$REPO_URL" | grep -q "dev.azure.com"; then
                echo "Detected Azure DevOps Services URL. Converting to SSH format..."
                PATH_PART=$(printf "%s" "$REPO_URL" | sed -E 's|^https?://([^@/]+@)?dev\.azure\.com/||; s|/_git/|/|')
                REPO_URL="git@ssh.dev.azure.com:v3/${PATH_PART}"
                echo "Converted URL: $REPO_URL"
              elif printf "%s" "$REPO_URL" | grep -Eq '^https?://([^@/]+@)?[^/]+\.visualstudio\.com/'; then
                echo "Detected legacy Azure DevOps Services URL. Converting to SSH format..."
                ORG=$(printf "%s" "$REPO_URL" | sed -E 's|^https?://([^@/]+@)?([^./]+)\.visualstudio\.com/.*$|\2|')
                PATH_PART=$(printf "%s" "$REPO_URL" | sed -E 's|^https?://([^@/]+@)?[^/]+\.visualstudio\.com/||; s|/_git/|/|')
                REPO_URL="git@ssh.dev.azure.com:v3/${ORG}/${PATH_PART}"
                echo "Converted URL: $REPO_URL"
              fi
              ;;
          esac
        fi

        if [ "${GIT_PROVIDER:-}" = "ado" ]; then
          case "$REPO_URL" in
            git@*|ssh://*) ;;
            *)
              if printf "%s" "$REPO_URL" | grep -q '/_git/'; then
                echo "Detected Azure DevOps Server URL. Converting to SSH format..."
                HOST=$(printf "%s" "$REPO_URL" | sed -E 's|^https?://([^@/]+@)?([^/:]+)(:[0-9]+)?/.*$|\2|')
                PATH_PART=$(printf "%s" "$REPO_URL" | sed -E 's|^https?://([^@/]+@)?[^/]+||')
                if [ -n "$HOST" ] && [ -n "$PATH_PART" ]; then
                  REPO_URL="git@${HOST}:${PATH_PART}"
                  echo "Converted URL: $REPO_URL"
                fi
              fi
              ;;
          esac
        fi

        if [ "${GIT_PROVIDER:-}" = "azure" ] || [ "${GIT_PROVIDER:-}" = "ado" ]; then
          case "$REPO_URL" in
            git@*:*|ssh://git@*) IS_AZURE_SSH=1 ;;
            *) IS_AZURE_SSH=0 ;;
          esac
        else
          IS_AZURE_SSH=0
        fi

        if [ "$IS_AZURE_SSH" -eq 1 ]; then
          EXPECTED_GIT_HOST=""
          case "$REPO_URL" in
            ssh://git@*) EXPECTED_GIT_HOST=$(printf "%s" "$REPO_URL" | sed -E 's|^ssh://git@([^/:]+).*|\1|') ;;
            git@*:* ) EXPECTED_GIT_HOST=$(printf "%s" "$REPO_URL" | sed -E 's|^git@([^:]+):.*|\1|') ;;
          esac

          SSH_CREDS_SECRET="${GIT_PROVIDER}-ssh-creds"

          SECRET_GIT_HOST=$($KUBECTL -n "$TARGET_NAMESPACE" get secret "$SSH_CREDS_SECRET" -o jsonpath='{.metadata.annotations.kpack\.io/git}' 2>/dev/null || true)
          if [ -n "$EXPECTED_GIT_HOST" ] && [ -n "$SECRET_GIT_HOST" ] && [ "$EXPECTED_GIT_HOST" != "$SECRET_GIT_HOST" ]; then
            echo "Error: kpack git host mismatch for Azure SSH clone."
            echo "- Repo URL host:      $EXPECTED_GIT_HOST"
            echo "- ${SSH_CREDS_SECRET} kpack.io/git: $SECRET_GIT_HOST"
            echo "Fix: set ${SSH_CREDS_SECRET} annotation kpack.io/git to '$EXPECTED_GIT_HOST' in namespace '$TARGET_NAMESPACE' (via CI infra repo), and ensure known_hosts includes that host key."
            exit 1
          fi

          KEY_B64=""
          for _ in $(seq 1 60); do
            KEY_B64=$($KUBECTL -n "$TARGET_NAMESPACE" get secret "$SSH_CREDS_SECRET" -o jsonpath='{.data.ssh-privatekey}' 2>/dev/null || true)
            if [ -n "$KEY_B64" ] && [ "$KEY_B64" != "cGxhY2Vob2xkZXI=" ]; then
              break
            fi
            sleep 2
          done
          if [ -z "$KEY_B64" ]; then
            echo "Error: Secret ${SSH_CREDS_SECRET} is missing or does not contain ssh-privatekey."
            exit 1
          fi
          if [ "$KEY_B64" = "cGxhY2Vob2xkZXI=" ]; then
            echo "Error: Secret ${SSH_CREDS_SECRET} still contains placeholder data after waiting."
            exit 1
          fi
        fi

        HAS_UV_NETRC=0
        if $KUBECTL -n "$TARGET_NAMESPACE" get secret uv-mirror-netrc >/dev/null 2>&1; then
          NETRC_B64=$($KUBECTL -n "$TARGET_NAMESPACE" get secret uv-mirror-netrc -o jsonpath='{.data.netrc}' 2>/dev/null || true)
          if [ -n "$NETRC_B64" ] && [ "$NETRC_B64" != "cGxhY2Vob2xkZXI=" ]; then
            HAS_UV_NETRC=1
          fi
        fi

        echo "Processing $MODE build for {{workflow.parameters.app_name}}..."
        echo "Source Revision:  $REVISION"
        echo "Target Image Tag: $IMAGE_TAG"

        BASE_IMAGE_NAME="${registry_server}/${REGISTRY_NAMESPACE}/${APP_NAME}"
        SUB_PATH_VALUE="{{workflow.parameters.sub_path}}"

        require_no_cntrl sub_path "$SUB_PATH_VALUE"

        if printf "%s" "$SUB_PATH_VALUE" | grep -q '"'; then
          die "Error: sub_path contains an unsupported character: \""
        fi

        IMAGE_SPEC_FILE=/tmp/kpack-image.yaml
        cat >"$IMAGE_SPEC_FILE" <<EOF
        apiVersion: kpack.io/v1alpha2
        kind: Image
        metadata:
          name: $APP_NAME
          namespace: $TARGET_NAMESPACE
        spec:
          tag: ${BASE_IMAGE_NAME}:latest
          additionalTags:
        EOF

        if [ "$MODE" = "tag" ]; then
          echo "  - \"${BASE_IMAGE_NAME}:${REVISION}\"" >> "$IMAGE_SPEC_FILE"
        fi
        echo "  - \"${BASE_IMAGE_NAME}:${IMAGE_TAG}\"" >> "$IMAGE_SPEC_FILE"

        cat >>"$IMAGE_SPEC_FILE" <<EOF
          builder:
            kind: ClusterBuilder
            name: luban-builder
          source:
            git:
              url: "$REPO_URL"
              revision: "$REVISION"
            subPath: "$SUB_PATH_VALUE"
          serviceAccountName: workflow-runner
          build:
        EOF

        if [ "$HAS_UV_NETRC" -eq 1 ]; then
          cat >>"$IMAGE_SPEC_FILE" <<EOF
            services:
            - name: uv-mirror-netrc
              kind: Secret
              apiVersion: v1
        EOF
        fi

        cat >>"$IMAGE_SPEC_FILE" <<EOF
            env:
            - name: BP_UV_RELEASE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: luban-config
                  key: uv_release_base_url
                  optional: true
            - name: BP_UV_PYTHON_INSTALL_MIRROR
              valueFrom:
                configMapKeyRef:
                  name: luban-config
                  key: uv_python_install_mirror
                  optional: true
        EOF

        if [ "$MODE" = "tag" ]; then
          cat >>"$IMAGE_SPEC_FILE" <<EOF
            - name: CI_TAG_UPDATE
              value: "${IMAGE_TAG}"
        EOF
        fi

        kubectl apply -f "$IMAGE_SPEC_FILE"

        echo "Image resource updated. Waiting for kpack build to be created..."
        BUILD_REF=""
        BUILD_REV=""
        LAST_LOG_TS=0
        START_TS=$(date +%s)
        TIMEOUT_SECONDS=600
        while true; do
          BUILD_REF=$($KUBECTL -n "$TARGET_NAMESPACE" get image "$APP_NAME" -o jsonpath='{.status.latestBuildRef.name}' 2>/dev/null || true)
          if [ -z "$BUILD_REF" ]; then
            BUILD_REF=$($KUBECTL -n "$TARGET_NAMESPACE" get image "$APP_NAME" -o jsonpath='{.status.latestBuildRef}' 2>/dev/null || true)
          fi
          if [ -n "$BUILD_REF" ]; then
            BUILD_REV=$($KUBECTL -n "$TARGET_NAMESPACE" get build "$BUILD_REF" -o jsonpath='{.spec.source.git.revision}' 2>/dev/null || true)
            if [ "$BUILD_REV" = "$REVISION" ]; then
              break
            fi
          fi

          NOW_TS=$(date +%s)
          ELAPSED=$((NOW_TS - START_TS))
          if [ $((NOW_TS - LAST_LOG_TS)) -ge 60 ]; then
            if [ -n "$BUILD_REF" ] && [ -n "$BUILD_REV" ] && [ "$BUILD_REV" != "$REVISION" ]; then
              echo "Waiting for kpack build for revision ${REVISION}... current latestBuildRef=${BUILD_REF} (rev=${BUILD_REV})"
            else
              echo "Waiting for kpack BuildRef... (${ELAPSED}s, target namespace: ${TARGET_NAMESPACE})"
            fi
            LAST_LOG_TS=$NOW_TS
          fi
          if [ "$ELAPSED" -ge "$TIMEOUT_SECONDS" ]; then
            break
          fi
          sleep 2
        done

        if [ -z "$BUILD_REF" ]; then
          echo "Error: kpack did not create a build for Image/$APP_NAME within timeout (${TIMEOUT_SECONDS}s)."
          kubectl -n "$TARGET_NAMESPACE" get image "$APP_NAME" -o yaml || true
          exit 1
        fi

        echo "Build created: $BUILD_REF"

        kp build logs "$APP_NAME" -n "$TARGET_NAMESPACE" &
        KP_LOGS_PID=$!

        echo "Waiting for kpack build to complete..."
        START_TS=$(date +%s)
        TIMEOUT_SECONDS=3600
        while true; do
          BUILD_STATUS=$($KUBECTL -n "$TARGET_NAMESPACE" get build "$BUILD_REF" -o jsonpath='{.status.conditions[?(@.type=="Succeeded")].status}' 2>/dev/null || true)
          BUILD_REASON=$($KUBECTL -n "$TARGET_NAMESPACE" get build "$BUILD_REF" -o jsonpath='{.status.conditions[?(@.type=="Succeeded")].reason}' 2>/dev/null || true)

          if [ "$BUILD_STATUS" = "True" ]; then
            echo "Build succeeded."
            break
          fi
          if [ "$BUILD_STATUS" = "False" ]; then
            echo "Build failed (${BUILD_REASON:-unknown})."
            kubectl -n "$TARGET_NAMESPACE" get build "$BUILD_REF" -o yaml || true
            exit 1
          fi

          NOW_TS=$(date +%s)
          ELAPSED=$((NOW_TS - START_TS))
          if [ "$ELAPSED" -ge "$TIMEOUT_SECONDS" ]; then
            echo "Error: kpack build did not complete within timeout (${TIMEOUT_SECONDS}s): $BUILD_REF"
            kubectl -n "$TARGET_NAMESPACE" get build "$BUILD_REF" -o yaml || true
            exit 1
          fi
          sleep 2
        done

        kill "$KP_LOGS_PID" 2>/dev/null || true

      env:
      - name: REGISTRY_NAMESPACE
        value: "{{inputs.parameters.namespace}}"
      - name: REPO_URL
        value: "{{workflow.parameters.repo_url}}"
      - name: GIT_PROVIDER
        value: "{{workflow.parameters.git_provider}}"
      - name: REVISION
        value: "{{workflow.parameters.revision}}"
      - name: APP_NAME
        value: "{{workflow.parameters.app_name}}"
      - name: TAG
        value: "{{workflow.parameters.tag}}"
      - name: GIT_REF
        value: "{{workflow.parameters.git_ref}}"
      - name: registry_server
        value: "{{workflow.parameters.registry_server}}"
      volumeMounts:
      - name: workdir
        mountPath: /workdir

  - name: git-update
    inputs:
      parameters:
        - name: namespace
    container:
      image: "{{workflow.parameters.gitops_utils_image}}"
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "500m"
      command: [sh, -c]
      args:
      - |
        set -euo pipefail

        die() { echo "$1"; exit 1; }

        case "${DEPLOY_ENV}" in
          snd|prd) ;;
          *) die "Error: DEPLOY_ENV must be 'snd' or 'prd': ${DEPLOY_ENV}" ;;
        esac

        case "${GITOPS_BRANCH}" in
          ""|*" "*|*".."*|*"~"*|*"^"*|*":"*|*"\\"*|*"?"*|*"*"*|*"["*|*"{"*|*"}"*)
            die "Error: invalid GITOPS_BRANCH: ${GITOPS_BRANCH}"
            ;;
        esac
        if ! printf '%s' "$GITOPS_BRANCH" | grep -Eq '^[A-Za-z0-9._/-]+$'; then
          die "Error: invalid GITOPS_BRANCH: ${GITOPS_BRANCH}"
        fi

        # Calculate derived parameters in shell for robustness.
        # Determine GitOps Repo URL
        if [ "$GIT_PROVIDER" = "azure" ] || [ "$GIT_PROVIDER" = "ado" ]; then
          if echo "$REPO_URL" | grep -q "ssh.dev.azure.com"; then
            BASE_PATH=$(echo "$REPO_URL" | sed -E 's|.*v3/||')
            ORG_PROJ=$(echo "$BASE_PATH" | cut -d/ -f1,2)
            GITOPS_REPO_URL="https://dev.azure.com/${ORG_PROJ}/_git/${APP_NAME}-gitops"
          else
            if ! printf '%s' "$REPO_URL" | grep -q '/_git/'; then
              die "Error: Azure REPO_URL is missing '/_git/': $REPO_URL"
            fi
            GITOPS_REPO_URL="${REPO_URL%/_git/*}/_git/${APP_NAME}-gitops"
            if [ -z "$GITOPS_REPO_URL" ]; then
              die "Error: failed to derive GitOps repo URL from Azure REPO_URL: $REPO_URL"
            fi
          fi
          echo "Detected Azure DevOps. Constructed GitOps URL: $GITOPS_REPO_URL"
        else
          GITOPS_REPO_URL="https://${GIT_PROVIDER}.com/${REGISTRY_NAMESPACE}/${APP_NAME}-gitops.git"
        fi

        AUTH_MODE="${GIT_HTTPS_AUTH_MODE:-credential_store}"
        BASIC_USER="${GIT_BASIC_AUTH_USERNAME:-$GIT_USERNAME}"

        run_git() {
          if [ "$AUTH_MODE" = "extraheader_basic" ]; then
            git -c http.extraHeader="$LUBAN_GIT_AUTH_HEADER" "$@"
          else
            git "$@"
          fi
        }

        configure_git_auth() {
          # Extract domain from GITOPS_REPO_URL
          DOMAIN=$(echo "$GITOPS_REPO_URL" | sed -e 's|^[^/]*//||' -e 's|/.*$||')

          case "$AUTH_MODE" in
            credential_store)
              git config --global credential.helper store
              echo "https://${BASIC_USER}:${GIT_TOKEN}@${DOMAIN}" > ~/.git-credentials
              ;;
            extraheader_basic)
              if ! command -v base64 >/dev/null 2>&1; then
                die "Error: missing 'base64' binary required for extraheader_basic auth"
              fi
              AUTH_B64=$(printf '%s' "${BASIC_USER}:${GIT_TOKEN}" | base64 | tr -d '\n')
              LUBAN_GIT_AUTH_HEADER="Authorization: Basic ${AUTH_B64}"
              export LUBAN_GIT_AUTH_HEADER
              ;;
            *)
              die "Error: invalid GIT_HTTPS_AUTH_MODE: ${AUTH_MODE}"
              ;;
          esac
        }

        configure_git_auth

        git config --global user.email "ci@luban.com"
        git config --global user.name "Luban CI"

        echo "Cloning ${GITOPS_REPO_URL}..."
        run_git clone "$GITOPS_REPO_URL" /workdir/gitops
        cd /workdir/gitops

        # Configure safe directory to avoid "fatal: detected dubious ownership"
        git config --global --add safe.directory /workdir/gitops

        if run_git show-ref --verify --quiet "refs/heads/${GITOPS_BRANCH}"; then \
          run_git checkout "${GITOPS_BRANCH}"; \
        else \
          if run_git ls-remote --exit-code --heads origin "${GITOPS_BRANCH}" >/dev/null 2>&1; then \
            run_git checkout -b "${GITOPS_BRANCH}" "origin/${GITOPS_BRANCH}"; \
          else \
            run_git checkout -b "${GITOPS_BRANCH}"; \
            run_git push -u origin "${GITOPS_BRANCH}"; \
          fi; \
        fi
        
        KUST_PATH="app/overlays/${DEPLOY_ENV}/kustomization.yaml"
        if [ ! -f "$KUST_PATH" ]; then
          die "Error: missing kustomization file: ${KUST_PATH}"
        fi
        BASE_DIR="app/base"
        APP_IMAGE_NAME="${registry_server}/${REGISTRY_NAMESPACE}/${APP_NAME}"
        export APP_IMAGE_NAME
        
        # Determine the image tag (identical to build steps logic)
        if printf "%s" "$GIT_REF" | grep -q '^refs/tags/'; then
          # Release Tag Logic
          IMAGE_TAG="${GIT_REF#refs/tags/}"
          IMAGE_TAG="${IMAGE_TAG#v}"
        else
          # Commit Logic
          IMAGE_TAG="${TAG:-$REVISION}"
        fi
        export IMAGE_TAG
        
        echo "Updating GitOps repo..."
        
        # Update Image Tag
        echo "Updating image tag to $IMAGE_TAG..."
        
        # Check if entry exists for APP_IMAGE_NAME
        if yq -e '.images[] | select(.name == env(APP_IMAGE_NAME))' "$KUST_PATH" >/dev/null 2>&1; then
            # Update newTag AND delete newName (to switch from placeholder alias to real image)
            yq -i 'with(.images[]; select(.name == env(APP_IMAGE_NAME)) | .newTag = env(IMAGE_TAG) | del(.newName))' "$KUST_PATH"
         else
            echo "Error: Image entry for $APP_IMAGE_NAME not found in $KUST_PATH. Please ensure the GitOps repository is correctly provisioned with an images block for this application."
            exit 1
         fi
        
        if run_git diff --quiet; then
          echo "No changes to commit."
        else
          run_git add .
          run_git commit -m "Update ${APP_NAME} ${DEPLOY_ENV} image tag to ${IMAGE_TAG}"
          run_git push
        fi
      env:
      - name: REGISTRY_NAMESPACE
        value: "{{inputs.parameters.namespace}}"
      - name: GIT_USERNAME
        valueFrom:
          secretKeyRef:
            name: "{{workflow.parameters.git_creds_secret}}"
            key: username
      - name: GIT_TOKEN
        valueFrom:
          secretKeyRef:
            name: "{{workflow.parameters.git_creds_secret}}"
            key: token
      - name: APP_NAME
        value: "{{workflow.parameters.app_name}}"
      - name: REVISION
        value: "{{workflow.parameters.revision}}"
      - name: TAG
        value: "{{workflow.parameters.tag}}"
      - name: GIT_REF
        value: "{{workflow.parameters.git_ref}}"
      - name: REPO_URL
        value: "{{workflow.parameters.repo_url}}"
      - name: GIT_PROVIDER
        value: "{{workflow.parameters.git_provider}}"
      - name: GITOPS_BRANCH
        value: "{{workflow.parameters.gitops_branch}}"
      - name: DEPLOY_ENV
        value: "{{workflow.parameters.deploy_env}}"
      - name: registry_server
        value: "{{workflow.parameters.registry_server}}"
      - name: GIT_HTTPS_AUTH_MODE
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: "{{workflow.parameters.git_provider}}_https_auth_mode"
            optional: true
      - name: GIT_BASIC_AUTH_USERNAME
        valueFrom:
          configMapKeyRef:
