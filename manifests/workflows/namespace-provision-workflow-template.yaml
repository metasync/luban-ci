apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: namespace-provision-template
  namespace: luban-ci
spec:
  entrypoint: bootstrap-namespace
  serviceAccountName: luban-ci-sa
  arguments:
    parameters:
      - name: luban_provisioner_image
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: luban_provisioner_image

  templates:
  - name: bootstrap-namespace
    inputs:
      parameters:
      - name: project_name
      - name: environment
      - name: git_organization
      - name: git_provider
        value: "azure"
        enum:
          - "github"
          - "azure"
      - name: admin_group
      - name: developer_group
    container:
      image: "{{workflow.parameters.luban_provisioner_image}}"
      command: ["luban-provisioner"]
      args:
        - k8s
        - --project-name
        - "{{inputs.parameters.project_name}}"
        - --environment
        - "{{inputs.parameters.environment}}"
        - --git-organization
        - "{{inputs.parameters.git_organization}}"
        - --git-provider
        - "{{inputs.parameters.git_provider}}"
        - --admin-group
        - "{{inputs.parameters.admin_group}}"
        - --developer-group
        - "{{inputs.parameters.developer_group}}"
        - --image-pull-secret
        - "$(IMAGE_PULL_SECRET)"
      env:
        - name: IMAGE_PULL_SECRET
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: image_pull_secret
