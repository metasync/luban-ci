apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: namespace-provision-template
  namespace: luban-ci
spec:
  entrypoint: bootstrap-namespace
  serviceAccountName: luban-ci-sa
  arguments:
    parameters:
      - name: project_name
      - name: environment
      - name: git_organization
      - name: git_provider
        value: "azure"
        enum:
          - "github"
          - "azure"
      - name: gitops_utils_image
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: gitops_utils_image

  templates:
  - name: bootstrap-namespace
    inputs:
      parameters:
      - name: project_name
      - name: environment
      - name: git_organization
      - name: git_provider
    steps:
    - - name: update-repo
        templateRef:
          name: infra-repo-update-template
          template: update-infra-cd-repo
        arguments:
          parameters:
          - name: repo_name
            value: "luban-infra-cd"
          - name: project_name
            value: "{{inputs.parameters.project_name}}"
          - name: env
            value: "{{inputs.parameters.environment}}"
          - name: git_organization
            value: "{{inputs.parameters.git_organization}}"
          - name: git_provider
            value: "{{inputs.parameters.git_provider}}"

    - - name: create-argo-app
        template: create-ns-app
        arguments:
          parameters:
          - name: project_name
            value: "{{inputs.parameters.project_name}}"
          - name: environment
            value: "{{inputs.parameters.environment}}"
          - name: git_organization
            value: "{{inputs.parameters.git_organization}}"
          - name: git_provider
            value: "{{inputs.parameters.git_provider}}"

  - name: create-ns-app
    inputs:
      parameters:
      - name: project_name
      - name: environment
      - name: git_organization
      - name: git_provider
    container:
      image: "{{workflow.parameters.gitops_utils_image}}"
      env:
        - name: GIT_SERVER
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: "{{inputs.parameters.git_provider}}_server"
        - name: CLUSTER_MAP
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: cluster_map
      command: [sh, -c]
      args:
      - |
        # Calculate Repo URL
        REPO_NAME="luban-infra-cd"
        # Assuming luban-infra project for Azure
        INFRA_PROJECT="luban-infra"

        if [ "{{inputs.parameters.git_provider}}" = "azure" ]; then
            REPO_URL="https://${GIT_SERVER}/{{inputs.parameters.git_organization}}/${INFRA_PROJECT}/_git/${REPO_NAME}"
        else
            REPO_URL="https://${GIT_SERVER}/{{inputs.parameters.git_organization}}/${REPO_NAME}.git"
        fi

        APP_NAME="{{inputs.parameters.environment}}-{{inputs.parameters.project_name}}-infra"

        # Get Destination Server from Cluster Map
        DEST_SERVER=$(echo "$CLUSTER_MAP" | jq -r --arg env "{{inputs.parameters.environment}}" '.[$env]')
        if [ -z "$DEST_SERVER" ] || [ "$DEST_SERVER" = "null" ]; then
            echo "Error: Could not find cluster URL for environment {{inputs.parameters.environment}}"
            exit 1
        fi

        NAMESPACE="{{inputs.parameters.environment}}-{{inputs.parameters.project_name}}"

        SYNC_POLICY_BLOCK=""
        if [ "{{inputs.parameters.environment}}" != "prd" ]; then
            SYNC_POLICY_BLOCK="automated:
              prune: true
              selfHeal: true"
        fi

        echo "Creating Namespace Infra App $APP_NAME..."

        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: $APP_NAME
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: ${REPO_URL}
            targetRevision: main
            path: overlays/{{inputs.parameters.environment}}-{{inputs.parameters.project_name}}
          destination:
            server: ${DEST_SERVER}
            namespace: ${NAMESPACE}
          ignoreDifferences:
            - group: ""
              kind: Secret
              name: harbor-ro-creds
              namespace: ${NAMESPACE}
              jsonPointers:
                - /data
                - /stringData
          syncPolicy:
            ${SYNC_POLICY_BLOCK}
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true
        EOF

  volumeClaimTemplates:
  - metadata:
      name: workdir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 100Mi
