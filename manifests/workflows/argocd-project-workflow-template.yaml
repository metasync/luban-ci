apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: argocd-project-setup-template
  namespace: luban-ci
spec:
  entrypoint: create-projects
  serviceAccountName: luban-ci-sa
  arguments:
    parameters:
      - name: project_name
        description: "Name of the project/team (e.g., 'payment')"
      - name: environment
        description: "Target environment (e.g., 'snd', 'prd')"
        value: "snd"
      - name: git_organization
        description: "Git Organization/User (defaults to project_name if empty)"
        value: ""
      - name: git_provider
        description: "Git Provider (e.g., 'github', 'azure', 'ado')"
        value: "azure"
        enum:
          - "github"
          - "azure"
          - "ado"
      - name: developer_group
        description: "OIDC group for developer access (Single Group)"
        value: ""
      - name: admin_group
        description: "OIDC group for admin access (Single Group)"
        value: ""
      - name: gitops_utils_image
        description: "Image for GitOps utility tools"
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: gitops_utils_image

  templates:
  - name: create-projects
    inputs:
      parameters:
      - name: environment
    steps:
    - - name: ensure-project
        template: ensure-project
        arguments:
          parameters:
          - name: environment
            value: "{{inputs.parameters.environment}}"
          - name: project_name
            value: "{{workflow.parameters.project_name}}"
          - name: git_provider
            value: "{{workflow.parameters.git_provider}}"
          - name: git_organization
            value: "{{workflow.parameters.git_organization}}"

  - name: ensure-project
    inputs:
      parameters:
      - name: environment
      - name: project_name
      - name: git_provider
      - name: git_organization
    steps:
    - - name: check-exists
        template: check-project-exists
        arguments:
          parameters:
          - name: environment
            value: "{{inputs.parameters.environment}}"
          - name: project_name
            value: "{{inputs.parameters.project_name}}"
    - - name: create-project
        template: create-project-resource
        arguments:
          parameters:
          - name: environment
            value: "{{inputs.parameters.environment}}"
          - name: project_name
            value: "{{inputs.parameters.project_name}}"
          - name: git_provider
            value: "{{inputs.parameters.git_provider}}"
          - name: git_organization
            value: "{{inputs.parameters.git_organization}}"
        when: "{{steps.check-exists.outputs.result}} == false"

  - name: check-project-exists
    inputs:
      parameters:
      - name: environment
      - name: project_name
    script:
      image: "{{workflow.parameters.gitops_utils_image}}"
      command: [sh]
      source: |
        PROJECT_NAME="{{inputs.parameters.environment}}-{{inputs.parameters.project_name}}"
        echo "Checking if ArgoCD project $PROJECT_NAME exists..." >&2
        if kubectl get appproject $PROJECT_NAME -n argocd > /dev/null 2>&1; then
          echo "Project $PROJECT_NAME already exists." >&2
          echo "true"
        else
          echo "Project $PROJECT_NAME does not exist." >&2
          echo "false"
        fi

  - name: create-project-resource
    inputs:
      parameters:
      - name: environment
      - name: project_name
      - name: git_provider
      - name: git_organization
    container:
      image: "{{workflow.parameters.gitops_utils_image}}"
      env:
        - name: GITHUB_SERVER
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: github_server
              optional: true
        - name: AZURE_SERVER
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: azure_server
              optional: true
        - name: ADO_SERVER
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: ado_server
              optional: true
        - name: CLUSTER_MAP
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: cluster_map
      command: [sh, -c]
      args:
      - |
        die() { echo "$1" >&2; exit 1; }
        has_cntrl() { printf '%s' "$1" | LC_ALL=C grep -q '[[:cntrl:]]'; }
        require_no_cntrl() { if has_cntrl "$2"; then die "Error: $1 contains control characters"; fi; }
        require_dns_label() { printf '%s' "$2" | grep -Eq '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$' || die "Error: $1 is not a valid DNS label: $2"; }
        require_group_name() {
          if [ -z "$2" ]; then
            return 0
          fi
          printf '%s' "$2" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9:._/@+-]{0,127}$' || die "Error: $1 is not a valid group name: $2"
        }

        ENV="{{inputs.parameters.environment}}"
        case "$ENV" in snd|prd) ;; *) die "Error: invalid environment: $ENV" ;; esac

        PROJECT_NAME_RAW="{{inputs.parameters.project_name}}"
        require_no_cntrl project_name "$PROJECT_NAME_RAW"
        require_dns_label project_name "$PROJECT_NAME_RAW"

        PROJECT_NAME="${ENV}-${PROJECT_NAME_RAW}"

        ORG="{{inputs.parameters.git_organization}}"
        if [ -z "$ORG" ]; then
          ORG="$PROJECT_NAME_RAW"
        fi

        require_no_cntrl git_organization "$ORG"
        if ! printf '%s' "$ORG" | grep -Eq '^[A-Za-z0-9._-]+$'; then
          die "Error: invalid git_organization: $ORG"
        fi

        ADMIN_GROUP="{{workflow.parameters.admin_group}}"
        DEVELOPER_GROUP="{{workflow.parameters.developer_group}}"
        require_no_cntrl admin_group "$ADMIN_GROUP"
        require_no_cntrl developer_group "$DEVELOPER_GROUP"
        require_group_name admin_group "$ADMIN_GROUP"
        require_group_name developer_group "$DEVELOPER_GROUP"

        ADMIN_GROUPS_BLOCK=""
        DEVELOPER_GROUPS_BLOCK=""
        if [ -n "$ADMIN_GROUP" ]; then
          ADMIN_GROUPS_BLOCK="groups: [\"${ADMIN_GROUP}\"]"
        fi
        if [ -n "$DEVELOPER_GROUP" ]; then
          DEVELOPER_GROUPS_BLOCK="groups: [\"${DEVELOPER_GROUP}\"]"
        fi
        
        # Resolve Git Server Domain from Environment Variables
        GIT_SERVER="github.com" # Default fallback
        if [ "{{inputs.parameters.git_provider}}" = "azure" ]; then
           GIT_SERVER="${AZURE_SERVER:-dev.azure.com}"
        elif [ "{{inputs.parameters.git_provider}}" = "ado" ]; then
           if [ -z "${ADO_SERVER:-}" ]; then
             die "Error: missing ado_server in luban-config"
           fi
           GIT_SERVER="${ADO_SERVER}"
        elif [ "{{inputs.parameters.git_provider}}" = "github" ]; then
           GIT_SERVER="${GITHUB_SERVER:-github.com}"
        else
           die "Error: invalid git_provider: {{inputs.parameters.git_provider}}"
        fi

        # Repo Whitelist Construction
        if { [ "{{inputs.parameters.git_provider}}" = "azure" ] || [ "{{inputs.parameters.git_provider}}" = "ado" ]; } && [ -n "{{inputs.parameters.git_organization}}" ]; then
            # Azure DevOps with Organization
            # URL: https://dev.azure.com/{ORG}/{PROJECT}/_git/*
            GITOPS_REPOS_WHITELIST="https://${GIT_SERVER}/${ORG}/${PROJECT_NAME_RAW}/_git/*"
        else
            # Standard GitHub or Azure without Org (Org=Project)
            GITOPS_REPOS_WHITELIST="https://${GIT_SERVER}/${ORG}/*"
        fi
        
        echo "Creating AppProject ${PROJECT_NAME}..."

        DEST_SERVER=$(echo "$CLUSTER_MAP" | jq -r --arg env "$ENV" '.[$env]')

        if [ -z "$DEST_SERVER" ] || [ "$DEST_SERVER" = "null" ]; then
          echo "Error: Could not find cluster URL for environment '$ENV' in cluster_map." >&2
          echo "Cluster Map: $CLUSTER_MAP" >&2
          exit 1
        fi
        
        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: AppProject
        metadata:
          name: ${PROJECT_NAME}
          namespace: argocd
        spec:
          description: "${PROJECT_NAME_RAW} team project for ${ENV} environment"
          sourceRepos: 
          - "${GITOPS_REPOS_WHITELIST}"
          destinations:
          - namespace: ${PROJECT_NAME}
            server: "${DEST_SERVER}"
          - namespace: gateway
            server: "${DEST_SERVER}"
          clusterResourceWhitelist:
          - group: ''
            kind: Namespace
          namespaceResourceWhitelist:
          - group: '*'
            kind: '*'
          roles:
          - name: project-developer
            description: Developer role with read and sync access
            ${DEVELOPER_GROUPS_BLOCK}
            policies:
            - "p, proj:${PROJECT_NAME}:project-developer, applications, get, ${PROJECT_NAME}/*, allow"
            - "p, proj:${PROJECT_NAME}:project-developer, applications, sync, ${PROJECT_NAME}/*, allow"
          - name: project-admin
            description: Admin role with full access
            ${ADMIN_GROUPS_BLOCK}
            policies:
            - "p, proj:${PROJECT_NAME}:project-admin, applications, *, ${PROJECT_NAME}/*, allow"
        EOF
