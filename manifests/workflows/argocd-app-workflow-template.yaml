apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: argocd-app-setup-template
  namespace: luban-ci
spec:
  entrypoint: create-applications
  serviceAccountName: luban-ci-sa
  arguments:
    parameters:
      - name: project_name
        description: "Name of the project/team (e.g., 'payment')"
      - name: app_name
        description: "Name of the application (e.g., 'cart-service')"
      - name: environment
        description: "Target environment (e.g., 'snd', 'prd')"
        value: "snd"
        enum:
          - "snd"
          - "prd"
      - name: git_organization
        description: "Git Organization/User (defaults to project_name if empty)"
        value: ""
      - name: git_provider
        description: "Git Provider (github, azure, etc.)"
        value: "azure"
        enum:
          - "github"
          - "azure"
          - "ado"
      - name: gitops_utils_image
        description: "Image for GitOps utility tools"
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: gitops_utils_image

  templates:
  - name: create-applications
    steps:
    - - name: ensure-application
        template: ensure-application
        arguments:
          parameters:
            - name: environment
              value: "{{workflow.parameters.environment}}"
            - name: app_name
              value: "{{workflow.parameters.app_name}}"
            - name: project_name
              value: "{{workflow.parameters.project_name}}"
            - name: git_provider
              value: "{{workflow.parameters.git_provider}}"
            - name: git_organization
              value: "{{workflow.parameters.git_organization}}"
            - name: gitops_utils_image
              value: "{{workflow.parameters.gitops_utils_image}}"

  - name: ensure-application
    inputs:
      parameters:
      - name: environment
      - name: app_name
      - name: project_name
      - name: git_provider
      - name: git_organization
    steps:
    - - name: check-exists
      # ... (no changes needed for check-exists unless we want to check remote cluster existence, but for now we check app existence in ArgoCD locally)
        template: check-app-exists
        arguments:
          parameters:
          - name: environment
            value: "{{inputs.parameters.environment}}"
          - name: app_name
            value: "{{inputs.parameters.app_name}}"
          - name: project_name
            value: "{{inputs.parameters.project_name}}"
    - - name: create-app
        template: create-app-resource
        arguments:
          parameters:
          - name: environment
            value: "{{inputs.parameters.environment}}"
          - name: app_name
            value: "{{inputs.parameters.app_name}}"
          - name: project_name
            value: "{{inputs.parameters.project_name}}"
          - name: git_provider
            value: "{{inputs.parameters.git_provider}}"
          - name: git_organization
            value: "{{inputs.parameters.git_organization}}"
        when: "{{steps.check-exists.outputs.result}} == false"

  - name: check-app-exists
    inputs:
      parameters:
      - name: environment
      - name: app_name
      - name: project_name
    script:
      image: "{{workflow.parameters.gitops_utils_image}}"
      command: [sh]
      source: |
        APP_NAME="{{inputs.parameters.environment}}-{{inputs.parameters.project_name}}-{{inputs.parameters.app_name}}"
        echo "Checking if ArgoCD application $APP_NAME exists in namespace argocd..." >&2
        if kubectl get application $APP_NAME -n argocd > /dev/null 2>&1; then
          echo "Application $APP_NAME already exists." >&2
          echo "true"
        else
          echo "Application $APP_NAME does not exist." >&2
          echo "false"
        fi

  - name: create-app-resource
    inputs:
      parameters:
      - name: environment
      - name: app_name
      - name: project_name
      - name: git_provider
      - name: git_organization
    container:
      image: "{{workflow.parameters.gitops_utils_image}}"
      env:
        - name: GIT_SERVER
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: "{{inputs.parameters.git_provider}}_server"
        - name: GIT_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: "{{inputs.parameters.git_provider}}_base_url"
              optional: true
        - name: CLUSTER_MAP
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: cluster_map
      command: [sh, -c]
      args:
      - |
        die() { echo "$1" >&2; exit 1; }
        has_cntrl() { printf '%s' "$1" | LC_ALL=C grep -q '[[:cntrl:]]'; }
        require_no_cntrl() { if has_cntrl "$2"; then die "Error: $1 contains control characters"; fi; }
        require_dns_label() { printf '%s' "$2" | grep -Eq '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$' || die "Error: $1 is not a valid DNS label: $2"; }

        ENV="{{inputs.parameters.environment}}"
        case "$ENV" in snd|prd) ;; *) die "Error: invalid environment: $ENV" ;; esac

        PROJECT_NAME="{{inputs.parameters.project_name}}"
        APP_NAME_RAW="{{inputs.parameters.app_name}}"
        require_no_cntrl project_name "$PROJECT_NAME"
        require_no_cntrl app_name "$APP_NAME_RAW"
        require_dns_label project_name "$PROJECT_NAME"
        require_dns_label app_name "$APP_NAME_RAW"

        # Calculate derived parameters in shell for robustness
        ORG="{{inputs.parameters.git_organization}}"
        if [ -z "$ORG" ]; then
          ORG="$PROJECT_NAME"
        fi

        require_no_cntrl git_organization "$ORG"
        if ! printf '%s' "$ORG" | grep -Eq '^[A-Za-z0-9._-]+$'; then
          die "Error: invalid git_organization: $ORG"
        fi
        
        REVISION="main"
        if [ "$ENV" = "snd" ]; then
          REVISION="develop"
        fi
        
        BASE_URL="${GIT_BASE_URL:-https://${GIT_SERVER}}"

        # Repo URL Construction
        if { [ "{{inputs.parameters.git_provider}}" = "azure" ] || [ "{{inputs.parameters.git_provider}}" = "ado" ]; } && [ -n "{{inputs.parameters.git_organization}}" ]; then
            # Azure DevOps with Organization
            # URL: https://dev.azure.com/{ORG}/{PROJECT}/_git/{REPO}
            REPO_URL="${BASE_URL}/${ORG}/${PROJECT_NAME}/_git/${APP_NAME_RAW}-gitops"
        else
            # Standard GitHub or Azure without Org (Org=Project)
            REPO_URL="${BASE_URL}/${ORG}/${APP_NAME_RAW}-gitops.git"
        fi

        # Determine Sync Policy
        SYNC_POLICY_BLOCK=""
        if [ "$ENV" != "prd" ]; then
          SYNC_POLICY_BLOCK="automated:
              prune: true
              selfHeal: true"
        fi

        # Resolve Cluster URL from Map
        DEST_SERVER=$(echo "$CLUSTER_MAP" | jq -r --arg env "$ENV" '.[$env]')

        if [ -z "$DEST_SERVER" ] || [ "$DEST_SERVER" = "null" ]; then
          echo "Error: Could not find cluster URL for environment '$ENV' in cluster_map." >&2
          echo "Cluster Map: $CLUSTER_MAP" >&2
          exit 1
        fi

        echo "Creating Application ${ENV}-${PROJECT_NAME}-${APP_NAME_RAW} in namespace argocd..."
        echo "Target Cluster: $DEST_SERVER"

        cat <<EOF | kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${ENV}-${PROJECT_NAME}-${APP_NAME_RAW}
          namespace: argocd
        spec:
          project: ${ENV}-${PROJECT_NAME}
          source:
            repoURL: "${REPO_URL}"
            targetRevision: "${REVISION}"
            path: app/overlays/${ENV}
          destination:
            server: "${DEST_SERVER}"
            namespace: ${ENV}-${PROJECT_NAME}
          syncPolicy:
            ${SYNC_POLICY_BLOCK}
            syncOptions:
              - CreateNamespace=true
        EOF
