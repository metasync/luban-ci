apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: luban-dagster-code-location-setup-template
  namespace: luban-ci
spec:
  entrypoint: setup-luban-dagster-code-location
  serviceAccountName: luban-ci-sa
  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 100Mi
  arguments:
    parameters:
      - name: project_name
        description: "Name of the project/team (e.g., 'payment')"
      - name: app_name
        description: "Name of the application (e.g., 'cart-service')"
      - name: environment
        description: "Target environment (e.g., 'snd', 'prd')"
        value: "snd"
        enum:
          - "snd"
          - "prd"
      - name: git_organization
        description: "Git Organization/User (defaults to project_name if empty)"
        value: ""
      - name: git_provider
        description: "Git Provider (e.g., 'github', 'gitlab')"
        value: "azure"
        enum:
          - "github"
          - "azure"
      - name: setup_source_repo
        description: "Whether to provision the source code repository"
        value: "yes"
        enum:
          - "yes"
          - "no"
      - name: dagster_platform_project
        description: "Project where Dagster Platform is running (defaults to project_name)"
        value: ""
      - name: dagster_platform_app
        description: "Application name of Dagster Platform"
        value: "dagster-platform"
      - name: gitops_utils_image
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: gitops_utils_image
      - name: luban_provisioner_image
        valueFrom:
          configMapKeyRef:
            name: luban-config
            key: luban_provisioner_image

  templates:
    - name: setup-luban-dagster-code-location
      dag:
        tasks:
          # 1. Generate Configuration
          - name: generate-config
            template: generate-config

          # 2. Provision GitOps Repository
          - name: provision-gitops-repo
            dependencies: [generate-config]
            templateRef:
              name: gitops-repo-provision-template
              template: provision-gitops-repo
            arguments:
              parameters:
                - name: project_name
                  value: "{{workflow.parameters.project_name}}"
                - name: application_name
                  value: "{{workflow.parameters.app_name}}"
                - name: git_organization
                  value: "{{workflow.parameters.git_organization}}"
                - name: git_provider
                  value: "{{workflow.parameters.git_provider}}"
                - name: config_file
                  value: "/workdir/config.yaml"

          # 3. Setup ArgoCD Application
          - name: setup-argocd-app
            dependencies: [provision-gitops-repo]
            templateRef:
              name: argocd-app-setup-template
              template: create-applications
            arguments:
              parameters:
                - name: app_name
                  value: "{{workflow.parameters.app_name}}"
                - name: project_name
                  value: "{{workflow.parameters.project_name}}"
                - name: environment
                  value: "{{workflow.parameters.environment}}"
                - name: git_organization
                  value: "{{workflow.parameters.git_organization}}"
                - name: git_provider
                  value: "{{workflow.parameters.git_provider}}"

          # 4. Provision Source Code Repository
          - name: provision-source-repo
            dependencies: [setup-argocd-app]
            when: "'{{workflow.parameters.setup_source_repo}}' == 'yes'"
            templateRef:
              name: source-repo-provision-template
              template: provision-source-repo
            arguments:
              parameters:
                - name: project_name
                  value: "{{workflow.parameters.project_name}}"
                - name: application_name
                  value: "{{workflow.parameters.app_name}}"
                - name: git_organization
                  value: "{{workflow.parameters.git_organization}}"
                - name: git_provider
                  value: "{{workflow.parameters.git_provider}}"
                - name: config_file
                  value: "/workdir/config.yaml"

          # 5. Register Code Location in Platform
          - name: register-code-location
            dependencies: [provision-source-repo]
            template: register-code-location
            arguments:
              parameters:
                - name: project_name
                  value: "{{workflow.parameters.project_name}}"
                - name: app_name
                  value: "{{workflow.parameters.app_name}}"
                - name: environment
                  value: "{{workflow.parameters.environment}}"
                - name: git_organization
                  value: "{{workflow.parameters.git_organization}}"
                - name: git_provider
                  value: "{{workflow.parameters.git_provider}}"
                - name: dagster_platform_project
                  value: "{{workflow.parameters.dagster_platform_project}}"
                - name: dagster_platform_app
                  value: "{{workflow.parameters.dagster_platform_app}}"

    - name: generate-config
      container:
        image: "{{workflow.parameters.luban_provisioner_image}}"
        imagePullPolicy: Always
        args:
          - config
          - --luban-config-dir
          - /etc/config/luban
          - --app-config-dir
          - /etc/config/app
          - --set
          - dagster_component_type=code-location
          - --set
          - template_type=dagster-code-location

        volumeMounts:
          - name: workdir
            mountPath: /workdir
          - name: luban-config
            mountPath: /etc/config/luban
          - name: luban-dagster-config
            mountPath: /etc/config/app
            
      volumes:
        - name: luban-config
          configMap:
            name: luban-config
        - name: luban-dagster-config
          configMap:
            name: luban-dagster-config

    - name: register-code-location
      inputs:
        parameters:
          - name: project_name
          - name: app_name
          - name: environment
          - name: git_organization
          - name: git_provider
          - name: dagster_platform_project
          - name: dagster_platform_app
      container:
        image: "{{workflow.parameters.luban_provisioner_image}}"
        command: [sh, -c]
        args:
          - |
            # Define variables first
            DAGSTER_PLATFORM_PROJECT="{{inputs.parameters.dagster_platform_project}}"
            PROJECT_NAME="{{inputs.parameters.project_name}}"
            DAGSTER_PLATFORM_APP="{{inputs.parameters.dagster_platform_app}}"
            ENV="{{inputs.parameters.environment}}"
            APP="{{inputs.parameters.app_name}}"
            GIT_ORG="{{inputs.parameters.git_organization}}"
            GIT_PROVIDER="{{inputs.parameters.git_provider}}"
            
            # Logic
            PLATFORM_PROJECT="$DAGSTER_PLATFORM_PROJECT"
            if [ -z "$PLATFORM_PROJECT" ]; then
              PLATFORM_PROJECT="$PROJECT_NAME"
            fi
            
            DOMAIN_SUFFIX="svc.cluster.local"
            LOCATION_HOST="${APP}.${ENV}-${PROJECT_NAME}.${DOMAIN_SUFFIX}"
            LOCATION_PORT="3000"
            
            echo "Registering Code Location:"
            echo "  Name: $APP"
            echo "  Host: $LOCATION_HOST"
            echo "  Port: $LOCATION_PORT"
            echo "  Env:  $ENV"
            echo "  Platform: $PLATFORM_PROJECT/$DAGSTER_PLATFORM_APP"
            
            uv run --frozen --no-sync luban-provisioner dagster register-location \
              --platform-project "$PLATFORM_PROJECT" \
              --platform-app "$DAGSTER_PLATFORM_APP" \
              --environment "$ENV" \
              --location-name "$APP" \
              --location-host "$LOCATION_HOST" \
              --location-port "$LOCATION_PORT" \
              --git-organization "$GIT_ORG" \
              --git-provider "$GIT_PROVIDER" \
              --git-server "$GIT_SERVER"

        env:
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.git_provider}}-creds"
                key: token
          - name: AZURE_DEVOPS_API_VERSION
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: azure_devops_api_version
                optional: true
          - name: GIT_SERVER
            valueFrom:
              configMapKeyRef:
                name: luban-config
                key: "{{inputs.parameters.git_provider}}_server"
                optional: true
