apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: luban-project-setup-template
  namespace: luban-ci
spec:
  entrypoint: setup-project
  serviceAccountName: luban-ci-sa
  arguments:
    parameters:
    - name: project_name
      description: "Name of the project/team (e.g., 'payment')"
    - name: environments
      description: "Target environments (e.g., ['snd', 'prd'])"
      value: '["snd", "prd"]'
    - name: git_organization
      description: "Git Organization/User (defaults to project_name if empty)"
      value: ""
    - name: git_provider
      description: "Git Provider (e.g., 'github', 'azure')"
      value: "azure"
      enum:
        - "github"
        - "azure"
    - name: developer_group
      description: "OIDC group for developer access (Single Group)"
      value: ""
    - name: admin_group
      description: "OIDC group for admin access (Single Group)"
      value: ""
    - name: registry_visibility
      description: "Project visibility (public or private)"
      value: "private"
      enum:
      - "public"
      - "private"
    - name: luban_provisioner_image
      description: "Image for Luban provisioner tool"
      valueFrom:
        configMapKeyRef:
          name: luban-config
          key: luban_provisioner_image
    - name: gitops_utils_image
      description: "Image for GitOps utility tools"
      valueFrom:
        configMapKeyRef:
          name: luban-config
          key: gitops_utils_image


  templates:
  - name: setup-project
    steps:
    - - name: git-project-setup
        template: git-project-setup
        arguments:
          parameters:
          - name: project_name
            value: "{{workflow.parameters.project_name}}"
          - name: git_organization
            value: "{{workflow.parameters.git_organization}}"
          - name: git_provider
            value: "{{workflow.parameters.git_provider}}"
          - name: admin_group
            value: "{{workflow.parameters.admin_group}}"
          - name: developer_group
            value: "{{workflow.parameters.developer_group}}"

      - name: harbor-project-setup
        templateRef:
          name: harbor-project-setup-template
          template: create-project
        arguments:
          parameters:
          - name: project_name
            value: "{{workflow.parameters.project_name}}"
          - name: registry_visibility
            value: "{{workflow.parameters.registry_visibility}}"

    - - name: ci-infra-provision
        templateRef:
          name: ci-infra-provision-template
          template: provision-ci-infra
        arguments:
          parameters:
          - name: project_name
            value: "{{workflow.parameters.project_name}}"
          - name: git_organization
            value: "{{workflow.parameters.git_organization}}"
          - name: git_provider
            value: "{{workflow.parameters.git_provider}}"
          - name: admin_group
            value: "{{workflow.parameters.admin_group}}"
          - name: developer_group
            value: "{{workflow.parameters.developer_group}}"

    - - name: argocd-project
        templateRef:
          name: argocd-project-setup-template
          template: create-projects
        arguments:
          parameters:
          - name: environment
            value: "{{item}}"
          - name: project_name
            value: "{{workflow.parameters.project_name}}"
          - name: git_organization
            value: "{{workflow.parameters.git_organization}}"
          - name: git_provider
            value: "{{workflow.parameters.git_provider}}"
          - name: admin_group
            value: "{{workflow.parameters.admin_group}}"
          - name: developer_group
            value: "{{workflow.parameters.developer_group}}"
        withParam: "{{workflow.parameters.environments}}"

    - - name: namespace-provision
        templateRef:
          name: namespace-provision-template
          template: bootstrap-namespace
        arguments:
          parameters:
          - name: project_name
            value: "{{workflow.parameters.project_name}}"
          - name: environment
            value: "{{item}}"
          - name: git_organization
            value: "{{workflow.parameters.git_organization}}"
          - name: git_provider
            value: "{{workflow.parameters.git_provider}}"
        withParam: "{{workflow.parameters.environments}}"

  - name: git-project-setup
    inputs:
      parameters:
        - name: project_name
        - name: git_organization
        - name: git_provider
        - name: admin_group
        - name: developer_group

    container:
      image: "{{workflow.parameters.luban_provisioner_image}}"
      imagePullPolicy: Always
      args:
        - project
        - --project-name
        - "{{inputs.parameters.project_name}}"
        - --git-organization
        - "{{inputs.parameters.git_organization}}"
        - --git-provider
        - "{{inputs.parameters.git_provider}}"
        - --git-server
        - "$(GIT_SERVER)"
        - --git-token
        - "$(GIT_TOKEN)"
        - --admin-group
        - "{{inputs.parameters.admin_group}}"
        - --developer-group
        - "{{inputs.parameters.developer_group}}"
        - --image-pull-secret
        - "$(IMAGE_PULL_SECRET)"
      env:
        - name: IMAGE_PULL_SECRET
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: image_pull_secret
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: "{{inputs.parameters.git_provider}}-creds"
              key: token
        - name: AZURE_DEVOPS_API_VERSION
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: azure_devops_api_version
              optional: true
        - name: GIT_SERVER
          valueFrom:
            configMapKeyRef:
              name: luban-config
              key: "{{inputs.parameters.git_provider}}_server"

  volumeClaimTemplates:
  - metadata:
      name: workdir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 100Mi
